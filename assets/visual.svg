<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="250" y="60" fill="#1f2937" font-size="22" font-family="Arial" font-weight="bold">
    AI Survey Validation Pipeline
  </text>

  <!-- Survey box -->
  <rect x="80" y="100" rx="12" ry="12" width="160" height="100" fill="#DCDCDC" stroke="#0e1111"/>
  <text x="105" y="155" fill="#0e1111" font-size="18" font-family="Arial" font-weight="bold">
    Survey Input
  </text>

  <!-- AI box -->
  <rect x="320" y="100" rx="12" ry="12" width="160" height="100" fill="#DCDCDC" stroke="#0e1111"/>
  <text x="357" y="155" fill="#0e1111" font-size="18" font-family="Arial" font-weight="bold">
    AI Engine
  </text>

  <!-- Output box -->
  <rect x="580" y="100" rx="12" ry="12" width="160" height="100" fill="#DCDCDC" stroke="#0e1111"/>
  <text x="605" y="143" fill="#0e1111" font-size="18" font-family="Arial" font-weight="bold">
    JSON Output
  </text>
  <text x="603" y="170" fill="#0e1111" font-size="14" font-family="Arial">
    ✓ Issues detected
  </text>

  <!-- Arrows -->
  <line x1="240" y1="150" x2="320" y2="150" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="320,150 310,145 310,155" fill="#9ca3af"/>

  <line x1="480" y1="150" x2="580" y2="150" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="580,150 570,145 570,155" fill="#9ca3af"/>

</svg><svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#0f172a"/>

  <!-- Survey block -->
  <rect x="60" y="100" width="100" height="100" fill="#1e293b"/>
  <text x="75" y="155" fill="#38bdf8" font-size="12" font-family="monospace">SURVEY</text>

  <!-- Arrow -->
  <text x="190" y="155" fill="#94a3b8" font-size="20">→</text>

  <!-- AI block -->
  <rect x="230" y="100" width="100" height="100" fill="#1e293b"/>
  <text x="255" y="155" fill="#22c55e" font-size="14" font-family="monospace">AI</text>

  <!-- Arrow -->
  <text x="360" y="155" fill="#94a3b8" font-size="20">→</text>

  <!-- Output block -->
  <rect x="400" y="100" width="120" height="100" fill="#1e293b"/>
  <text x="415" y="145" fill="#facc15" font-size="10" font-family="monospace">{ JSON }</text>
  <text x="420" y="165" fill="#f87171" font-size="10" font-family="monospace">issues ✓</text>

  <!-- Title -->
  <text x="150" y="50" fill="#e2e8f0" font-size="16" font-family="monospace">
    AI Survey Validation Pipeline
  </text>
</svg>
